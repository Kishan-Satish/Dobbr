apiVersion: apps/v1
kind: Deployment
metadata:
  name: Food-Ordering-System
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Food-Ordering-System
  template:
    metadata:
      labels:
        app:  
    spec:
      containers:
      - name: Food-Ordering-System
        image: Kishan-Satish/Food-Ordering-System: latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: Food-Ordering-System-service
spec:
  type: NodePort
  selector:
    app: Food-Ordering-System
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007
