apiVersion: apps/v1
kind: Deployment
metadata:
  name: Dobbr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Dobbr
  template:
    metadata:
      labels:
        app:  
    spec:
      containers:
      - name: Dobbr
        image: Kishan-Satish/Dobbr: latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: Dobbr-service
spec:
  type: NodePort
  selector:
    app: Dobbr
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007
