apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-book-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dobbr
  template:
    metadata:
      labels:
        app: dobbr
    spec:
      containers:
      - name: dobbr
        image: samisundar/dobbr:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: dobbr
spec:
  type: NodePort
  selector:
    app: dobbr
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007
